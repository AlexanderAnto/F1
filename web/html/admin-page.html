<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Administradores</title>
    <link rel="stylesheet" href="../css/admin-common.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../Data/img/iconoApp.png">
</head>
<body>

    <button type="button" class="btn-fondo"></button>

    <form id="adminForm">
        <h1>Agregar Administrador</h1>
        <div class="form-group">
            <label>Nombre de Administrador:</label>
            <input type="text" id="adminNombre" required placeholder="nombre">
        </div>
        <div class="form-group">
            <label>Contraseña:</label>
            <input type="password" id="adminPass" required placeholder="contraseña">
        </div>
        <button type="submit">Agregar Administrador</button>
    </form>

    <div class="poop">
        <div class="poop-content">
            <h2>¿DESEA SALIR DE ESTA VENTANA?</h2>
            <button id="yes">SI</button>
            <button id="no">NO</button>
        </div>
    </div>

    <h2 style="text-align:center;">Administradores registrados</h2>
    <table id="adminTable">
        <thead><tr><th>ID</th><th>Nombre</th></tr></thead>
        <tbody></tbody>
    </table>

    <script type="module" src="../js/admin-profile.js"></script>
</body>
</html>
