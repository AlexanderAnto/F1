<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/ticket-buy.css">
    <title>Comprar Boleto</title>
</head>

<body>

    <form id="buyForm">

        <!-- GP -->
        <label for="gp">GP</label>

        <select name="gp" id="gp">
            <option value="">
                Selecciona un GP
            </option>
        </select>

        <br>

        <!-- GRADA -->
        <label for="grada">Grada</label>

        <select name="grada" id="grada">
            <option value="">
                Selecciona una Grada
            </option>
        </select>

        <br>

        <!-- ASIENTO -->
        <label for="asiento">Asiento</label>

        <select name="asiento" id="asiento">
            <option value="">
                Selecciona un Asiento
            </option>
        </select>

        <br>

        <!-- PRECIO -->
        <label>Precio:</label>

        <span id="precioBoleto">
            $0
        </span>

        <br>

        <!-- CANTIDAD -->
        <button type="button" id="btnMin">
            -
        </button>

        <input
            type="number"
            id="Cantbolet"
            value="1"
            min="1"
        >

        <button type="button" id="btnMax">
            +
        </button>

        <br>

        <button type="submit">
            Comprar
        </button>

    </form>

    <script
        type="module"
        src="../js/buy-ticket.js">
    </script>

</body>
</html>
