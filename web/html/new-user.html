<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario</title>
    <link rel="stylesheet" href="../css/new-user.css">
</head>

<body>
     <button type="button" class="btn-fondo"></button>
    <form id="newUserForm" method="POST" action="/registro">
        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name" required placeholder="nombre">
        <br>
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" required placeholder="Apellido">
        <br>
        <label for="email">Correo:</label>
        <input type="email" id="email" name="email" required placeholder="email">
        <br>
        <label for="telefon">Telefono:</label>
        <input type="tel" name="telefono" id="telefono" required placeholder="telefono">
        <br>
        <label for="direccion">Dirección:</label>
        <input type="text" id="direccion" name="direccion" placeholder="direccion">
        <br>
        <label for="paises">País:</label>
        <select id="paises" name="paises" required>
            <option value="">Selecciona un país</option>
        </select>
        <br>
        <label for="password">Contraseña:</label>
        <input type="password" name="password" id="password" required placeholder="contraseña">
        <br>
        <label for="confirmPassword">Confirmar contraseña:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="contraseña">
        <br>
        <label>
            <input type="checkbox"  id="estado_contraseña">
            Ver Contraseña
        </label>
        <br>
        <label>
            <input type="checkbox" required>
            Acepto los términos y condiciones
        </label>
        <br>
        <button type="submit">Crear Usuario</button>
    </form>
    <script src="../js/api-control.js"></script>
    <script src="../js/new-user.js"></script>
</body>

</html>
