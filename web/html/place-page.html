<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Lugares</title>
    <link rel="stylesheet" href="../css/admin-common.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../Data/img/iconoApp.png">
</head>

<body>

    <button type="button" class="btn-fondo"></button>

    <form id="lugarForm">
        <h1>Agregar Lugar</h1>
        <div class="form-group">
            <label>País del Evento:</label>
            <select id="paises" name="paises" required>
                <option value="">Selecciona un país</option>
            </select>
        </div>
        <div class="form-group">
            <label>Pista de Carrera:</label>
            <input type="text" id="PistaEvento" required>
        </div>
        <button type="submit">Agregar Lugar</button>
    </form>

    <div class="poop">
        <div class="poop-content">
            <h2>¿DESEA SALIR DE ESTA VENTANA?</h2>
            <button id="yes">SI</button>
            <button id="no">NO</button>
        </div>
    </div>

    <h2 style="text-align:center;">Lugares registrados</h2>
    <table id="lugarTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>País</th>
                <th>Pista</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script type="module" src="../js/place-page.js"></script>
     <script type="module" src="../js/api-control.js"></script>
</body>

</html>
