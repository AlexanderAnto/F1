<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Mi Perfil
    </title>

    <link rel="stylesheet"
        href="../css/admin-common.css">

</head>

<body>

    <!-- ========================= -->
    <!-- PERFIL -->
    <!-- ========================= -->

    <form id="profileForm">

        <h1>
            Mi Perfil
        </h1>

        <!-- NOMBRE -->

        <label>
            Nombre
        </label>

        <input
            type="text"
            id="nombre"
            required
        >

        <br>

        <!-- APELLIDO -->

        <label>
            Apellido
        </label>

        <input
            type="text"
            id="apellido"
            required
        >

        <br>

        <!-- EMAIL -->

        <label>
            Correo
        </label>

        <input
            type="email"
            id="correo"
            required
        >

        <br>

        <!-- TELEFONO -->

        <label>
            Teléfono
        </label>

        <input
            type="text"
            id="telefono"
            required
        >

        <br>

        <!-- DIRECCION -->

        <label>
            Dirección
        </label>

        <input
            type="text"
            id="direccion"
            required
        >

        <br>

        <!-- PAIS -->

        <label>
            País
        </label>

        <input
            type="text"
            id="pais"
            required
        >

        <br>

        <!-- PASSWORD -->

        <label>
            Nueva Contraseña
        </label>

        <input
            type="password"
            id="password_usuario"
            placeholder="Opcional"
        >

        <br>

        <button type="submit">
            Guardar Cambios
        </button>

    </form>


    <!-- ========================= -->
    <!-- METODOS -->
    <!-- ========================= -->

    <h2>
        Métodos de Pago
    </h2>

    <table id="tablaPagos">

        <thead>

            <tr>

                <th>ID</th>
                <th>Método</th>
                <th>Proveedor</th>
                <th>Preferido</th>
                <th>Acción</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

    <script
        type="module"
        src="../js/profile.js">
    </script>

</body>

</html>
