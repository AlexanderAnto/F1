<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control</title>
    <link rel="stylesheet" href="../css/select-admin.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../Data/img/iconoApp.png">

</head>
<header class="topbar">
    <h1>Panel de Control</h1>

    <div class="sesion">
        <div class="contenedorI">
            <img src="../Data/img/btn_Admin.png" alt="Usuario">
        </div>

        <ul class="menu">
            <h2>Administrador</h2>
            <li>Ajustes</li>
            <li id="cerrerSecion">Cerrar sesión</li>
        </ul>
    </div>

</header>

<body id="bgm">


    <div class="selectorAction">
        <div class="fila">

            <a href="city-page.html" class="card">
                <img src="../Data/img/btn_grada.png">
                <span>GRADAS</span>
            </a>

            <a href="place-page.html" class="card">
                <img src="../Data/img/btn_localizacion.png">
                <span>LUGARES</span>
            </a>

            <a href="gp-page.html" class="card">
                <img src="../Data/img/btn_gp.png">
                <span>GP</span>
            </a>

            <a href="ticket-page.html" class="card">
                <img src="../Data/img/btn_boletos.png">
                <span>BOLETOS</span>
            </a>

            <a href="admin-page.html" class="card">
                <img src="../Data/img/btn_Admin.png">
                <span>ADMINISTRADOR</span>
            </a>

            <a href="viewer-user.html" class="card">
                <img src="../Data/img/btn_cliente.png">
                <span>CLIENTES</span>
            </a>

        </div>
    </div>

    <script>
        const boton = document.querySelector('.contenedorI');
        const menu = document.querySelector('.menu');

        // Abrir/cerrar menú
        boton.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.toggle('activo');
        });

        // Cerrar al hacer click fuera
        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && !boton.contains(e.target)) {
                menu.classList.remove('activo');
            }
        });
        document.getElementById("cerrerSecion").addEventListener("click",(e) => {
            window.location.href = "../../index.html";
        } )

    </script>

</body>

</html>
