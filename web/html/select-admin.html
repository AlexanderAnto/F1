<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control</title>
    <link rel="stylesheet" href="../css/select-admin.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../Data/img/iconoApp.png">

</head>
<header class="topbar">
    <h1>Panel de Control</h1>

    <div class="sesion">
        <div class="contenedorI">
            <img src="../Data/img/btn_Admin.png" alt="Usuario">
        </div>

        <ul class="menu">
            <h2 id="userName"></h2>
            <li>Ajustes</li>
            <li id="cerrerSecion">Cerrar sesión</li>
        </ul>
    </div>

</header>

<body id="bgm">


    <div class="selectorAction">
        <div class="fila">

            <a href="city-page.html" class="card">
                <img src="../Data/img/btn_grada.png">
                <span>GRADAS</span>
            </a>

            <a href="place-page.html" class="card">
                <img src="../Data/img/btn_localizacion.png">
                <span>LUGARES</span>
            </a>

            <a href="gp-page.html" class="card">
                <img src="../Data/img/btn_gp.png">
                <span>GP</span>
            </a>

            <a href="ticket-page.html" class="card">
                <img src="../Data/img/btn_boletos.png">
                <span>BOLETOS</span>
            </a>

            <a href="admin-page.html" class="card">
                <img src="../Data/img/btn_Admin.png">
                <span>ADMINISTRADOR</span>
            </a>

            <a href="viewer-user.html" class="card">
                <img src="../Data/img/btn_cliente.png">
                <span>CLIENTES</span>
            </a>

        </div>
    </div>

    <script>

    // =========================
    // ELEMENTOS
    // =========================

    const boton =
        document.querySelector(
            '.contenedorI'
        );

    const menu =
        document.querySelector(
            '.menu'
        );

    const userName =
        document.getElementById(
            'userName'
        );


    // =========================
    // OBTENER SESIÓN
    // =========================

    const usuarioGuardado =
        localStorage.getItem(
            "usuario"
        );


    // =========================
    // VALIDAR SESIÓN
    // =========================

    if (!usuarioGuardado) {

        window.location.href =
            "../../index.html";

    } else {

        const usuario =
            JSON.parse(
                usuarioGuardado
            );

        // MOSTRAR NOMBRE

        userName.textContent =
            `${usuario.nombre} ${usuario.apellido}`;
    }


    // =========================
    // MENU
    // =========================

    boton.addEventListener(
        'click',
        (e) => {

            e.stopPropagation();

            menu.classList.toggle(
                'activo'
            );

        }
    );


    document.addEventListener(
        'click',
        (e) => {

            if (
                !menu.contains(e.target) &&
                !boton.contains(e.target)
            ) {

                menu.classList.remove(
                    'activo'
                );
            }

        }
    );


    // =========================
    // CERRAR SESIÓN
    // =========================

    document.getElementById(
        "cerrerSecion"
    ).addEventListener(
        "click",
        () => {

            // ELIMINAR SESIÓN

            localStorage.removeItem(
                "usuario"
            );

            sessionStorage.clear();

            // REDIRECCIONAR

            window.location.href =
                "../../index.html";
        }
    );

</script>
</body>

</html>
